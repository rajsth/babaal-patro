name: babaal_patro
description: "A modern Nepali Calendar (Bikram Sambat) app with dark theme."
publish_to: 'none'
version: 1.1.1+4

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  nepali_utils: ^3.0.2
  flutter_riverpod: ^2.6.1
  shared_preferences: ^2.3.4
  home_widget: ^0.7.0
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.4
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  google_sign_in: ^6.2.1
  dio: ^5.7.0
  package_info_plus: ^8.0.0
  path_provider: ^2.1.0
  open_filex: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "app_icon_1024x1024.png"
  min_sdk_android: 21
  web:
    generate: true
  windows:
    generate: true
  macos:
    generate: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/app_icon.png
    - assets/data/artifact-2081.json
    - assets/data/artifact-2082.json
    - assets/data/artifact-2083.json

  fonts:
    - family: NotoSansDevanagari
      fonts:
        - asset: assets/fonts/NotoSansDevanagari-Regular.ttf
        - asset: assets/fonts/NotoSansDevanagari-Bold.ttf
          weight: 700
